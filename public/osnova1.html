<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-1.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дедушка Дрёма ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #a5b4fc 0%, #c4b5fd 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .story-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        .message {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full">

        <!-- Заголовок -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold text-purple-800 mb-2 flex items-center justify-center gap-3">
                <span>🧓</span> Дедушка Дрёма <span>✨</span>
            </h1>
            <p class="text-purple-700 text-lg">Сказки, в которых ты — главный герой!</p>
        </div>

        <!-- Основная карточка -->
        <div class="story-card p-8">
            <div id="story-container" class="h-[500px] overflow-y-auto pr-4 space-y-6 mb-8 custom-scrollbar">
                <!-- Сообщения будут добавляться сюда -->
            </div>

            <!-- Поле ввода -->
            <div class="flex gap-3">
                <input 
                    type="text" 
                    id="user-input"
                    placeholder="Что дальше сделает герой? Напиши..."
                    class="flex-1 px-6 py-4 rounded-2xl border border-purple-200 focus:border-purple-400 focus:outline-none text-lg"
                    autocomplete="off"
                >
                <button 
                    onclick="sendAnswer()"
                    class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-2xl font-semibold flex items-center gap-2 transition-all active:scale-95">
                    <i class="fas fa-paper-plane"></i>
                    Отправить
                </button>
            </div>

            <div class="text-center text-purple-500 text-sm mt-4">
                Дедушка Дрёма всегда ждёт твоего продолжения ✨
            </div>
        </div>
    </div>

    <script>
        const storyContainer = document.getElementById('story-container');
        const input = document.getElementById('user-input');

        // Заглушки (как в твоём Python-боте)
        const stubs = [
            "🪄 Дедушка Дрёма колдует...",
            "📖 Переворачиваю страницу...",
            "✨ Добавляю немного волшебства...",
            "🌟 Думаю над следующим приключением..."
        ];

        function addMessage(text, isAI = true) {
            const div = document.createElement('div');
            div.className = `message p-5 rounded-2xl max-w-[85%] ${isAI ? 'bg-purple-100 ml-auto text-right' : 'bg-white border border-purple-100'}`;
            
            div.innerHTML = `
                ${isAI ? `
                    <div class="flex items-center gap-2 justify-end mb-1">
                        <span class="text-purple-600 font-medium">Дедушка Дрёма</span>
                        <span class="text-2xl">🧓</span>
                    </div>
                ` : `
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-2xl">👦</span>
                        <span class="font-medium text-purple-700">Ты</span>
                    </div>
                `}
                <p class="text-lg leading-relaxed">${text}</p>
            `;
            storyContainer.appendChild(div);
            storyContainer.scrollTop = storyContainer.scrollHeight;
        }

        async function sendAnswer() {
    const userText = input.value.trim();
    if (!userText) return;

    addMessage(userText, false);
    input.value = '';

    const stubIndex = Math.floor(Math.random() * stubs.length);
    const loadingId = 'loading-' + Date.now();
    const loadingDiv = document.createElement('div');
    loadingDiv.id = loadingId;
    loadingDiv.className = "message p-5 rounded-2xl bg-purple-50 italic text-purple-500";
    loadingDiv.textContent = stubs[stubIndex];
    storyContainer.appendChild(loadingDiv);
    storyContainer.scrollTop = storyContainer.scrollHeight;

    try {
        const response = await fetch('/api/tales/generate', {   // ← ИСПРАВЛЕНО
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: 12345678,        // можно потом сделать динамическим
                userMessage: userText
            })
        });

        const data = await response.json();

        document.getElementById(loadingId)?.remove();

        if (data.text) {
            addMessage(data.text, true);
        } else {
            addMessage("Что-то пошло не так...", true);
        }
    } catch (err) {
        document.getElementById(loadingId)?.remove();
        addMessage("Ой... Дедушка Дрёма потерялся в лесу. Попробуй позже!", true);
        console.error("Fetch error:", err);
    }
}

        // Отправка по Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendAnswer();
        });

        // Пример приветственного сообщения
        window.onload = () => {
            addMessage("Привет, мой юный друг! ✨<br>Я Дедушка Дрёма. Давай вместе сочиним волшебную сказку!<br>Напиши, что должно произойти дальше.", true);
        };
    </script>
</body>
</html>
